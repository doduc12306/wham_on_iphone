name: Build Native iOS App

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Xcode version
      uses: maxim-lobanov/setup-xcode@v1
      with:
        xcode-version: 'latest-stable'

    - name: Build Xcode Project (No Codesign)
      run: |
        # Lệnh này sẽ tìm file .xcodeproj và build nó sang dạng thô mà không cần chứng chỉ bảo mật ngay
        xcodebuild -project *.xcodeproj -scheme WHAM -configuration Release -sdk iphoneos CODE_SIGNING_ALLOWED=NO

    - name: Package into .ipa
      run: |
        mkdir -p Payload
        # Tìm file .app vừa build xong và ném vào thư mục Payload để đóng gói thành .ipa
        cp -r build/Release-iphoneos/*.app Payload/
        zip -r WHAM.ipa Payload

    - name: Upload IPA Artifact
      uses: actions/actions-artifact@v4
      with:
        name: ios-app-ipa
        path: WHAM.ipa
