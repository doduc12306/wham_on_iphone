name: Build Native iOS App

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Xcode version
      uses: maxim-lobanov/setup-xcode@v1
      with:
        xcode-version: 'latest-stable'

    - name: Build Xcode Project (No Codesign)
      run: |
        # Tự động tìm kiếm file .xcodeproj hoặc .xcworkspace trong toàn bộ repo
        PROJECT_PATH=$(find . -name "*.xcodeproj" -o -name "*.xcworkspace" | head -n 1)
        
        if [ -z "$PROJECT_PATH" ]; then
          echo "Error: Không tìm thấy file dự án Xcode nào (.xcodeproj hoặc .xcworkspace)!"
          exit 1
        fi
        
        echo "Tìm thấy dự án tại: $PROJECT_PATH"
        
        # Lấy tên file và phần mở rộng
        EXT="${PROJECT_PATH##*.}"
        
        # Xác định flag dựa trên loại dự án (.xcodeproj hay .xcworkspace)
        if [ "$EXT" = "xcworkspace" ]; then
          XCODE_FLAG="-workspace"
        else
          XCODE_FLAG="-project"
        fi
        
        # Chạy lệnh build sử dụng đường dẫn vừa tìm được
        xcodebuild $XCODE_FLAG "$PROJECT_PATH" -scheme WHAM -configuration Release -sdk iphoneos CODE_SIGNING_ALLOWED=NO OBJROOT="${{ github.workspace }}/build" SYMROOT="${{ github.workspace }}/build"

    - name: Package into .ipa
      run: |
        mkdir -p Payload
        # Tìm file .app đã build xong trong thư mục output và đưa vào Payload
        APP_PATH=$(find ${{ github.workspace }}/build -name "*.app" | head -n 1)
        if [ -z "$APP_PATH" ]; then
          echo "Error: Không tìm thấy file .app sau khi build!"
          exit 1
        fi
        cp -r "$APP_PATH" Payload/
        zip -r WHAM.ipa Payload

    - name: Upload IPA Artifact
      uses: actions/upload-artifact@v4
      with:
        name: ios-app-ipa
        path: WHAM.ipa
