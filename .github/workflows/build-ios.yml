name: Build Native iOS App

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Xcode version
      uses: maxim-lobanov/setup-xcode@v1
      with:
        xcode-version: 'latest-stable'

    - name: Build Xcode Project (No Codesign)
      run: |
        set -euo pipefail

        # Tự động ưu tiên file .xcworkspace nếu có, nếu không thì dùng .xcodeproj
        WORKSPACE_PATH=$(find . -name "*.xcworkspace" | head -n 1)
        if [ -n "$WORKSPACE_PATH" ]; then
          PROJECT_PATH="$WORKSPACE_PATH"
          XCODE_FLAG="-workspace"
        else
          PROJECT_PATH=$(find . -name "*.xcodeproj" | head -n 1)
          if [ -z "$PROJECT_PATH" ]; then
            echo "Error: Không tìm thấy file dự án Xcode nào (.xcodeproj hoặc .xcworkspace)!"
            exit 1
          fi
          XCODE_FLAG="-project"
        fi

        echo "Tìm thấy dự án tại: $PROJECT_PATH"

        PROJECT_NAME=$(basename "$PROJECT_PATH")
        PROJECT_NAME="${PROJECT_NAME%.*}"

        if [ -n "${IOS_SCHEME:-}" ]; then
          SCHEME="$IOS_SCHEME"
        elif [ "$XCODE_FLAG" = "-workspace" ]; then
          SCHEME=$(xcodebuild -list -json -workspace "$PROJECT_PATH" | jq -r --arg project "$PROJECT_NAME" '.workspace.schemes | (map(select(.==$project)) | .[0]) // .[0] // empty')
        else
          SCHEME=$(xcodebuild -list -json -project "$PROJECT_PATH" | jq -r --arg project "$PROJECT_NAME" '.project.schemes | (map(select(.==$project)) | .[0]) // .[0] // empty')
        fi
        if [ -z "$SCHEME" ]; then
          echo "Error: Không tìm thấy scheme trong dự án!"
          exit 1
        fi
        echo "Dùng scheme: $SCHEME"

        echo "SCHEME=$SCHEME" >> "$GITHUB_ENV"
        echo "BUILD_DIR=${{ github.workspace }}/build" >> "$GITHUB_ENV"

        # Chạy lệnh build sử dụng đường dẫn và scheme vừa tìm được
        xcodebuild "$XCODE_FLAG" "$PROJECT_PATH" -scheme "$SCHEME" -configuration Release -sdk iphoneos CODE_SIGNING_ALLOWED=NO OBJROOT="${{ github.workspace }}/build" SYMROOT="${{ github.workspace }}/build"

    - name: Package into .ipa
      run: |
        set -euo pipefail
        mkdir -p Payload
        # Tìm file .app đã build xong trong thư mục output và đưa vào Payload
        APP_DIR="${BUILD_DIR}/Release-iphoneos"
        if [ ! -d "$APP_DIR" ]; then
          APP_DIR="${BUILD_DIR}"
        fi
        APP_PATH=$(find "${APP_DIR}" -maxdepth 1 -type d -name "*.app" | head -n 1)
        if [ -z "$APP_PATH" ]; then
          echo "Error: Không tìm thấy file .app sau khi build!"
          exit 1
        fi
        cp -r "$APP_PATH" Payload/
        zip -r WHAM.ipa Payload

    - name: Upload IPA Artifact
      uses: actions/upload-artifact@v4
      with:
        name: ios-app-ipa
        path: WHAM.ipa
